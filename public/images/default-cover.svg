<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.10"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="#f5f7fa" rx="6"/>
  <rect width="300" height="400" fill="url(#bg)" rx="6"/>
  <rect x="10" y="10" width="280" height="380" fill="none" stroke="#dcdfe6" stroke-width="1.5" rx="3"/>
  <!-- Book spine shadow -->
  <rect x="50" y="50" width="6" height="300" fill="#dcdfe6" rx="1"/>
  <!-- Book pages -->
  <rect x="60" y="50" width="180" height="300" fill="#fff" opacity="0.9" rx="1"/>
  <!-- Book icon simplified -->
  <g transform="translate(150, 180)" fill="none" stroke="#c0c4cc" stroke-width="2">
    <rect x="-30" y="-35" width="60" height="70" rx="2"/>
    <line x1="-15" y1="-20" x2="15" y2="-20"/>
    <line x1="-15" y1="-8" x2="15" y2="-8"/>
    <line x1="-15" y1="4" x2="10" y2="4"/>
  </g>
  <!-- Title -->
  <text x="150" y="290" text-anchor="middle" fill="#909399" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14">暂无封面</text>
</svg>
